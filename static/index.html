  <style>
    :root {
      --bg: #0a0b0f;
      --fg: #e9edf2;
      --muted: #6b7280;
      --accent: #00a651;
      --accent2: #7f3f98;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(1100px 560px at 50% -12%, rgba(0, 166, 81, 0.10), transparent 60%),
        radial-gradient(900px 520px at 50% 112%, rgba(127, 63, 152, 0.12), transparent 60%),
        var(--bg);
      color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, system-ui, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 440px; }
    .mark {
      width: 78px;
      height: 78px;
      margin: 0 auto;
      filter: drop-shadow(0 10px 30px rgba(0, 166, 81, 0.28));
    }
    .mark svg { width: 100%; height: 100%; display: block; }
    h1 {
      font-size: 27px;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
    }
    h1 .accent {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .url {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin: 0 0 22px;
      padding: 5px 13px 5px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      font-size: 13.5px;
      color: #c3c9d2;
      letter-spacing: 0.01em;
    }
    .url svg {
      width: 14px;
      height: 14px;
      fill: var(--accent);
      flex-shrink: 0;
    }
    p {
      color: #9aa3af;
      margin: 0 auto 6px;
      max-width: 360px;
    }
    .foot {
      color: var(--muted);
      font-size: 12.5px;
      letter-spacing: 0.02em;
      margin-top: 28px;
    }
    .foot a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .foot a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
